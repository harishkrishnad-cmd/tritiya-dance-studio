services:
  - type: web
    name: tritiya-dance-studio
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: tritiya-data
      mountPath: /data
      sizeGB: 1
